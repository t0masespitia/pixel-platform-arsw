<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Canvas WebSocket Test Client</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #1a1a1a; color: #e0e0e0; }
    h1 { color: #90caf9; font-size: 1.2rem; }
    #status { padding: 6px 12px; border-radius: 4px; display: inline-block; font-weight: bold; margin-bottom: 16px; }
    #status.connected { background: #1b5e20; color: #a5d6a7; }
    #status.disconnected { background: #b71c1c; color: #ef9a9a; }
    .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
    form { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; color: #bdbdbd; }
    input[type=number] { width: 70px; padding: 6px; background: #2d2d2d; border: 1px solid #555; color: #e0e0e0; border-radius: 4px; }
    input[type=color] { width: 60px; height: 34px; padding: 2px; background: #2d2d2d; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
    input[type=text] { padding: 6px; background: #2d2d2d; border: 1px solid #555; color: #e0e0e0; border-radius: 4px; font-family: monospace; }
    button { padding: 7px 18px; background: #1565c0; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #1976d2; }
    button:disabled { background: #444; cursor: not-allowed; }
    #log { background: #111; border: 1px solid #333; border-radius: 4px; padding: 12px; height: 200px; overflow-y: auto; }
    .entry { padding: 3px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
    .entry .ts { color: #757575; margin-right: 8px; }
    .entry .pixel { color: #80cbc4; }
    .entry .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 4px; border: 1px solid #555; }
    .section-title { font-size: 0.75rem; color: #757575; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px; }
    #canvas { border: 1px solid #555; image-rendering: pixelated; display: block; margin-top: 16px; }
    .hint { font-size: 0.75rem; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>Canvas WebSocket Test Client</h1>
  <div id="status" class="disconnected">Desconectado</div>

  <div class="section-title">Autenticación JWT</div>
  <div class="row">
    <label style="flex:1;">JWT Token <span class="hint">(Obtené un token con POST /api/auth/login — o leé localStorage.getItem('token') en DevTools)</span>
      <input type="text" id="jwtToken" style="width:100%;" placeholder="Bearer eyJ...">
    </label>
  </div>

  <div class="section-title">Lienzo</div>
  <div class="row">
    <label>Canvas ID
      <input type="text" id="canvasId" style="width:320px;" placeholder="UUID del lienzo">
    </label>
    <button type="button" id="btn-connect">Conectar a este lienzo</button>
    <label>Zoom
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="range" id="zoomSlider" min="1" max="20" value="4" step="1" style="width:120px;">
        <span id="zoomValue">4x</span>
      </div>
    </label>
  </div>

  <div class="section-title">Pintar pixel</div>
  <form id="paint-form">
    <label>User ID <input type="text" id="userId" maxlength="40" style="width:120px;"></label>
    <label>X <input type="number" id="px" value="5" min="0" max="499"></label>
    <label>Y <input type="number" id="py" value="10" min="0" max="499"></label>
    <label>Color (hex)
      <div style="display:flex;gap:4px;">
        <input type="color" id="pc" value="#FF5733">
        <input type="text" id="pc-text" value="#FF5733" maxlength="7" style="width:80px;">
      </div>
    </label>
    <button type="submit" id="btn-paint" disabled>Pintar</button>
  </form>

  <div class="section-title">Pixels recibidos via /topic/canvas/{canvasId} y /topic/canvas/{canvasId}/bulk-update</div>
  <div id="log"></div>

  <canvas id="canvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <script>
    document.getElementById('userId').value = 'usuario-' + Math.floor(Math.random() * 10000);

    const statusEl  = document.getElementById('status');
    const logEl     = document.getElementById('log');
    const btnPaint  = document.getElementById('btn-paint');
    const btnConnect = document.getElementById('btn-connect');
    const pcPicker  = document.getElementById('pc');
    const pcText    = document.getElementById('pc-text');
    const canvasEl  = document.getElementById('canvas');

    let stompClient = null;
    let currentCanvasId = null;
    let currentCanvasWidth = 0;
    let currentCanvasHeight = 0;

    pcPicker.addEventListener('input', () => { pcText.value = pcPicker.value.toUpperCase(); });
    pcText.addEventListener('input', () => {
      if (/^#[0-9A-Fa-f]{6}$/.test(pcText.value)) pcPicker.value = pcText.value;
    });

    function getToken() {
      const val = document.getElementById('jwtToken').value.trim();
      return val.startsWith('Bearer ') ? val : (val ? 'Bearer ' + val : '');
    }

    function authHeaders() {
      const token = getToken();
      return token ? { 'Authorization': token } : {};
    }

    function setStatus(connected) {
      statusEl.textContent = connected ? 'Conectado' : 'Desconectado';
      statusEl.className = connected ? 'connected' : 'disconnected';
      btnPaint.disabled = !connected;
    }

    function paintPixel(x, y, color) {
      const ctx = canvasEl.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(x, y, 1, 1);
    }

    function applySnapshot(snapshot) {
      Object.entries(snapshot.pixels).forEach(function([key, color]) {
        const parts = key.split(',');
        paintPixel(parseInt(parts[0], 10), parseInt(parts[1], 10), color);
      });
    }

    function appendLog(pixel) {
      const ts = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML =
        '<span class="ts">' + ts + '</span>' +
        '<span class="swatch" style="background:' + pixel.color + '"></span>' +
        '<span class="pixel">x=' + pixel.x + '  y=' + pixel.y + '  color=' + pixel.color + '</span>';
      logEl.prepend(div);
    }

    function resizeCanvas(width, height) {
      currentCanvasWidth  = width;
      currentCanvasHeight = height;
      canvasEl.width  = width;
      canvasEl.height = height;
      const scale = parseInt(document.getElementById('zoomSlider').value, 10);
      canvasEl.style.width  = (width  * scale) + 'px';
      canvasEl.style.height = (height * scale) + 'px';
      canvasEl.getContext('2d').clearRect(0, 0, width, height);
    }

    document.getElementById('zoomSlider').addEventListener('input', function() {
      const scale = parseInt(this.value, 10);
      document.getElementById('zoomValue').textContent = scale + 'x';
      if (currentCanvasWidth > 0) {
        canvasEl.style.width  = (currentCanvasWidth  * scale) + 'px';
        canvasEl.style.height = (currentCanvasHeight * scale) + 'px';
      }
    });

    async function connectToCanvas() {
      const canvasId = document.getElementById('canvasId').value.trim();
      if (!canvasId) { alert('Ingresa un Canvas ID'); return; }

      if (stompClient && stompClient.connected) {
        stompClient.disconnect();
        stompClient = null;
        setStatus(false);
      }

      let info;
      try {
        const res = await fetch('http://localhost:8082/api/canvases/' + canvasId, {
          headers: authHeaders()
        });
        if (!res.ok) { alert('Lienzo no encontrado o sin autorización: ' + canvasId + ' (' + res.status + ')'); return; }
        info = await res.json();
      } catch (err) {
        alert('Error al contactar canvas-service: ' + err.message);
        return;
      }

      resizeCanvas(info.width, info.height);
      currentCanvasId = canvasId;

      const socket = new SockJS('http://localhost:8082/ws-canvas');
      stompClient = Stomp.over(socket);
      stompClient.debug = null;

      stompClient.connect(authHeaders(), function() {
        setStatus(true);

        stompClient.subscribe('/topic/canvas/' + canvasId, function(msg) {
          const pixel = JSON.parse(msg.body);
          paintPixel(pixel.x, pixel.y, pixel.color);
          appendLog(pixel);
        });

        stompClient.subscribe('/app/canvas/' + canvasId + '/state', function(msg) {
          const snapshot = JSON.parse(msg.body);
          applySnapshot(snapshot);
        });

        stompClient.subscribe('/topic/canvas/' + canvasId + '/bulk-update', function(msg) {
          const snapshot = JSON.parse(msg.body);
          applySnapshot(snapshot);
        });
      }, function() {
        setStatus(false);
      });
    }

    btnConnect.addEventListener('click', connectToCanvas);

    document.getElementById('paint-form').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!stompClient || !stompClient.connected || !currentCanvasId) return;
      const userId = document.getElementById('userId').value.trim();
      const x      = parseInt(document.getElementById('px').value, 10);
      const y      = parseInt(document.getElementById('py').value, 10);
      const color  = pcText.value.trim();
      if (!userId) { alert('El User ID no puede estar vacio'); return; }
      if (!/^#[0-9A-Fa-f]{6}$/.test(color)) { alert('Color invalido. Usa formato #RRGGBB'); return; }
      stompClient.send('/app/canvas/' + currentCanvasId + '/pixel', {}, JSON.stringify({ userId, x, y, color }));
    });

    window.addEventListener('load', async function() {
      try {
        const res = await fetch('http://localhost:8082/api/canvases/general', {
          headers: authHeaders()
        });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('canvasId').value = data.id;
        }
      } catch (e) {
        // servidor no disponible aun
      }
    });
  </script>
</body>
</html>

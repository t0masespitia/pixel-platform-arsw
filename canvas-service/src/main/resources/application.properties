spring.application.name=canvas-service
spring.profiles.active=dev
management.endpoints.web.exposure.include=health,info,prometheus,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/${spring.application.name}.log
logging.level.edu.eci.arsw.pixelplatform.canvas=DEBUG
canvas.general.width=100
canvas.general.height=100
canvas.cooldown-millis=500
frontend.base-url=http://localhost:5173
jwt.secret=${JWT_SECRET:dev-secret-key-pixelplatform-auth-service-arsw-2026}

# Resilience4j - circuit breaker y retry para llamadas a auth-service y chat-service
resilience4j.circuitbreaker.instances.authService.sliding-window-size=10
resilience4j.circuitbreaker.instances.authService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.authService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.authService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.authService.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.chatService.sliding-window-size=10
resilience4j.circuitbreaker.instances.chatService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.chatService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.chatService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.chatService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.chatService.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.authService.max-attempts=3
resilience4j.retry.instances.authService.wait-duration=500ms
resilience4j.retry.instances.authService.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException
resilience4j.retry.instances.authService.ignore-exceptions=java.lang.IllegalArgumentException

resilience4j.retry.instances.chatService.max-attempts=3
resilience4j.retry.instances.chatService.wait-duration=500ms
resilience4j.retry.instances.chatService.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException
resilience4j.retry.instances.chatService.ignore-exceptions=java.lang.IllegalArgumentException

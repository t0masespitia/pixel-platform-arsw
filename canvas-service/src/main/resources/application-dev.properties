server.port=8082
spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/canvas_db
spring.datasource.username=pixel_user
spring.datasource.password=pixel_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.data.redis.host=localhost
spring.data.redis.port=6379
cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
auth-service.base-url=http://localhost:8081
chat-service.base-url=http://localhost:8083

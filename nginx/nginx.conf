events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    upstream frontend { server frontend:80; }
    upstream api_gateway { server api-gateway:8080; }
    upstream canvas_service { server canvas-service:8082; }
    upstream chat_service { server chat-service:8083; }
    upstream signaling_service { server signaling-service:8084; }

    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /ws-canvas {
            proxy_pass             http://canvas_service;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        location /ws-chat {
            proxy_pass             http://chat_service;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        location /ws-signaling {
            proxy_pass             http://signaling_service;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }
    }
}

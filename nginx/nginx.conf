# ================================================================
# PixelPlatform — nginx/nginx.conf
# ================================================================

events {
    worker_connections 1024;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Optimizaciones básicas ─────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;   # Para subida de imágenes (HU-11)

    # ── Upstream services ──────────────────────────────────────
    upstream backend {
        server app:8080;
    }

    # upstream frontend {          ← PENDIENTE: descomentar en Semana 2
    #     server frontend:5173;
    # }

    server {
        listen 80;
        server_name localhost;

        # ── REST API ───────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Spring Actuator (health/metrics) ──────────────────
        location /actuator/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        # ── WebSocket STOMP (/ws) ──────────────────────────────
        location /ws {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;   # Mantener conexión WS abierta
            proxy_send_timeout     3600s;
        }

        # ── Frontend React / Vite ──────────────────────────────
        # PENDIENTE: descomentar en Semana 2 cuando exista ./frontend
        # location / {
        #     proxy_pass         http://frontend;
        #     proxy_set_header   Host              $host;
        #     proxy_set_header   X-Real-IP         $remote_addr;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Upgrade    $http_upgrade;
        #     proxy_set_header   Connection "upgrade";
        # }

        # ── Placeholder temporal mientras no hay frontend ──────
        location / {
            return 200 '{"status":"PixelPlatform backend running","docs":"/actuator/health"}';
            add_header Content-Type application/json;
        }
    }
}

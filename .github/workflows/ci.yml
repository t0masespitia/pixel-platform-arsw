name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - canvas-service
          - chat-service
          - signaling-service
          - ai-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Dar permisos de ejecucion a mvnw
        working-directory: ${{ matrix.service }}
        run: chmod +x mvnw

      - name: Correr tests
        working-directory: ${{ matrix.service }}
        run: ./mvnw test -B

  test-integration:
    name: Integracion ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - canvas-service
          - chat-service
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Dar permisos de ejecucion a mvnw
        working-directory: ${{ matrix.service }}
        run: chmod +x mvnw

      - name: Correr tests de integracion (Testcontainers)
        working-directory: ${{ matrix.service }}
        run: ./mvnw verify -B

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  sonarqube:
    name: SonarQube ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-backend, test-integration]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - canvas-service
          - chat-service
          - signaling-service
          - ai-service
          - api-gateway
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Dar permisos de ejecucion a mvnw
        working-directory: ${{ matrix.service }}
        run: chmod +x mvnw

      - name: Saltar analisis si faltan secretos
        if: ${{ env.SONAR_TOKEN == '' || (env.SONAR_HOST_URL == 'https://sonarcloud.io' && env.SONAR_ORGANIZATION == '') }}
        run: |
          echo "No se ejecuta SonarQube/SonarCloud porque falta configuracion."
          echo "Requerido siempre: SONAR_TOKEN."
          echo "Requerido para SonarCloud: SONAR_ORGANIZATION."
          echo "Opcional para SonarQube propio: SONAR_HOST_URL."

      - name: Analizar con SonarQube
        if: ${{ env.SONAR_TOKEN != '' && (env.SONAR_HOST_URL != 'https://sonarcloud.io' || env.SONAR_ORGANIZATION != '') }}
        working-directory: ${{ matrix.service }}
        run: |
          PROJECT_KEY="${GITHUB_REPOSITORY_OWNER}_${GITHUB_REPOSITORY#*/}_${{ matrix.service }}"
          PROJECT_KEY="${PROJECT_KEY//[^A-Za-z0-9_.:-]/_}"
          SONAR_ARGS=(
            "-Dsonar.projectKey=${PROJECT_KEY}"
            "-Dsonar.projectName=${{ matrix.service }}"
            "-Dsonar.host.url=${SONAR_HOST_URL}"
            "-Dsonar.token=${SONAR_TOKEN}"
          )
          if [ -n "${SONAR_ORGANIZATION}" ]; then
            SONAR_ARGS+=("-Dsonar.organization=${SONAR_ORGANIZATION}")
          fi
          ./mvnw verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.1.0.4751:sonar -B "${SONAR_ARGS[@]}"

  build-docker-images:
    name: Build imagen Docker de ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-backend, test-integration, build-frontend, sonarqube]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - canvas-service
          - chat-service
          - signaling-service
          - ai-service
          - api-gateway
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build (solo validar, sin publicar)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false
          tags: pixel-platform-arsw-${{ matrix.service }}:ci

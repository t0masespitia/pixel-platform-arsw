name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - canvas-service
          - chat-service
          - signaling-service
          - ai-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Dar permisos de ejecucion a mvnw
        working-directory: ${{ matrix.service }}
        run: chmod +x mvnw

      - name: Correr tests
        working-directory: ${{ matrix.service }}
        run: ./mvnw test -B

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  build-docker-images:
    name: Build imagen Docker de ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - canvas-service
          - chat-service
          - signaling-service
          - ai-service
          - api-gateway
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build (solo validar, sin publicar)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false
          tags: pixel-platform-arsw-${{ matrix.service }}:ci
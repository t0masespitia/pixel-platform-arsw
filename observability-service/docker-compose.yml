version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: pixelplatform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pixelplatform-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: pixelplatform-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: pixelplatform-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ../auth-service/logs:/var/log/pixelplatform/auth-service:ro
      - ../canvas-service/logs:/var/log/pixelplatform/canvas-service:ro
      - ../chat-service/logs:/var/log/pixelplatform/chat-service:ro
      - ../signaling-service/logs:/var/log/pixelplatform/signaling-service:ro
      - ../ai-service/logs:/var/log/pixelplatform/ai-service:ro
      - ../api-gateway/logs:/var/log/pixelplatform/api-gateway:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

spring.application.name=ai-service
spring.profiles.active=dev
management.endpoints.web.exposure.include=health,info,prometheus,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/${spring.application.name}.log
logging.level.edu.eci.arsw.pixelplatform.ai=DEBUG
jwt.secret=${JWT_SECRET:dev-secret-key-pixelplatform-auth-service-arsw-2026}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Resilience4j - circuit breaker y retry para llamadas a canvas-service
resilience4j.circuitbreaker.instances.canvasService.sliding-window-size=10
resilience4j.circuitbreaker.instances.canvasService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.canvasService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.canvasService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.canvasService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.canvasService.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.canvasService.max-attempts=3
resilience4j.retry.instances.canvasService.wait-duration=500ms
resilience4j.retry.instances.canvasService.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException
resilience4j.retry.instances.canvasService.ignore-exceptions=java.lang.IllegalArgumentException

spring.application.name=api-gateway
spring.profiles.active=dev
server.port=8080
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/${spring.application.name}.log
logging.level.edu.eci.arsw.pixelplatform.gateway=DEBUG
jwt.secret=${JWT_SECRET:dev-secret-key-pixelplatform-auth-service-arsw-2026}

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=5
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=10
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@userKeyResolver}

spring.cloud.gateway.routes[1].id=canvas-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/canvas,/api/canvas/**,/api/canvases,/api/canvases/**
spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[1].filters[0].args.key-resolver=#{@userKeyResolver}

spring.cloud.gateway.routes[2].id=chat-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/messages/**
spring.cloud.gateway.routes[2].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.replenishRate=15
spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.burstCapacity=30
spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[2].filters[0].args.key-resolver=#{@userKeyResolver}

spring.cloud.gateway.routes[3].id=ai-service
spring.cloud.gateway.routes[3].uri=http://localhost:8085
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.routes[3].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.replenishRate=3
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.burstCapacity=5
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[3].filters[0].args.key-resolver=#{@userKeyResolver}
